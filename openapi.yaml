openapi: 3.0.3
info:
  title: Crazzzy.in Backend API
  description: Professional e-commerce API for Crazzzy.in featuring product management, Cloudinary integration, and Razorpay payments.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Local Development Server
  - url: https://crazzzy.in/api
    description: Production Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  # --- AUTH ---
  /auth/signup:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "Jane Doe" }
                email: { type: string, example: "jane@example.com" }
                password: { type: string, example: "SecurePassword123!" }
      responses:
        200: { description: Success }

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login and get tokens
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, example: "jane@example.com" }
                password: { type: string, example: "SecurePassword123!" }
      responses:
        200: { description: Success }

  /auth/verify-otp:
    post:
      tags: [Authentication]
      summary: Verify OTP
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, example: "jane@example.com" }
                otp: { type: string, example: "123456" }
                type: { type: string, enum: [VERIFICATION, PASSWORD_RESET] }
      responses:
        200: { description: Verified }

  /auth/verify-email-otp:
    post:
      tags: [Authentication]
      summary: Verify email OTP after signup
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, example: "jane@example.com" }
                otp: { type: string, example: "123456" }
      responses:
        200: { description: Verified }

  /auth/logout:
    post:
      tags: [Authentication]
      security: [{ bearerAuth: [] }]
      summary: Logout current session
      responses:
        200: { description: Success }

  /auth/logout-all:
    post:
      tags: [Authentication]
      security: [{ bearerAuth: [] }]
      summary: Logout all sessions
      responses:
        200: { description: Success }


  # --- ORDERS ---
  /create-order:
    post:
      tags: [Orders]
      security: [{ bearerAuth: [] }]
      summary: Create a Razorpay order
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      productId: { type: integer }
                      quantity: { type: integer }
                addressId: { type: integer }
                phoneNumber: { type: string }
      responses:
        201: { description: Success }

  /verify-payment:
    post:
      tags: [Orders]
      security: [{ bearerAuth: [] }]
      summary: Verify Razorpay payment signature
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                razorpay_order_id: { type: string }
                razorpay_payment_id: { type: string }
                razorpay_signature: { type: string }
                orderId: { type: integer }
      responses:
        200: { description: Payment Verified }

  /orders:
    get:
      tags: [Orders]
      security: [{ bearerAuth: [] }]
      summary: Get user order history
      responses:
        200: { description: Success }

  /orders/{id}:
    get:
      tags: [Orders]
      security: [{ bearerAuth: [] }]
      summary: Get order details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        200: { description: Success }

  /orders/apply-coupon:
    post:
      tags: [Orders]
      security: [{ bearerAuth: [] }]
      summary: Apply coupon to a pending order
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                couponCode: { type: string }
      responses:
        200: { description: Coupon Applied }

  /health:
    get:
      tags: [System]
      summary: API health check
      responses:
        200: { description: Success }



  # --- USERS ---
  /users/addresses:
    get:
      tags: [User Profile]
      security: [{ bearerAuth: [] }]
      summary: Get user addresses
      responses:
        200: { description: Success }
    post:
      tags: [User Profile]
      security: [{ bearerAuth: [] }]
      summary: Add a new address
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                street: { type: string }
                city: { type: string }
                state: { type: string }
                postalCode: { type: string }
                country: { type: string }
                isDefault: { type: boolean }
      responses:
        201: { description: Success }

  /users/wishlist:
    get:
      tags: [User Profile]
      security: [{ bearerAuth: [] }]
      summary: Get user wishlist
      responses:
        200: { description: Success }

  /users/wishlist/{productId}:
    post:
      tags: [User Profile]
      security: [{ bearerAuth: [] }]
      summary: Toggle product in wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      responses:
        200: { description: Toggled }

  /users/addresses/{id}:
    put:
      tags: [User Profile]
      security: [{ bearerAuth: [] }]
      summary: Update an address
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        200: { description: Success }
    delete:
      tags: [User Profile]
      security: [{ bearerAuth: [] }]
      summary: Delete an address
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        200: { description: Success }


  # --- PRODUCTS ---
  /products:
    get:
      tags: [Public Products]
      summary: List and search products
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: category
          in: query
          description: Category or Parent Category slug
          schema: { type: string, example: "wall-posters" }
        - name: search
          in: query
          description: Search in title, description, category, or tags
          schema: { type: string, example: "anime" }
      responses:
        200: { description: Success }

  /products/{slug}:
    get:
      tags: [Public Products]
      summary: Get product details by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        200: { description: Success }

  /products/{productId}/reviews:
    get:
      tags: [Public Products]
      summary: Get reviews for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      responses:
        200: { description: Success }
    post:
      tags: [Public Products]
      security: [{ bearerAuth: [] }]
      summary: Add a review for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rating: { type: integer }
                comment: { type: string }
      responses:
        201: { description: Success }


  # --- ADMIN ---
  /admin/products:
    post:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Create a new product (with images and tags)
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title: { type: string }
                price: { type: number }
                stock: { type: integer }
                categoryId: { type: integer }
                tags: { type: string, description: "e.g. #anime #poster" }
                images:
                  type: array
                  items: { type: string, format: binary }
      responses:
        201: { description: Created }

  /admin/products/bulk-update:
    patch:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Update multiple products at once
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                updates:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: integer }
                      title: { type: string }
                      price: { type: number }
                      tags: { type: string }
                      stock: { type: integer }
      responses:
        200: { description: Updated }

  /admin/categories:
    post:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Create a category with branding image
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name: { type: string }
                image: { type: string, format: binary }
      responses:
        201: { description: Created }
  /admin/upload:
    post:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Upload an image and get Cloudinary details immediately
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image: { type: string, format: binary }
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  imageUrl: { type: string }
                  publicId: { type: string }

  /admin/products/{id}:
    delete:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Delete a product and its images
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        200: { description: Success }

  /admin/categories/{id}:
    put:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name: { type: string }
                image: { type: string, format: binary }
      responses:
        200: { description: Success }
    delete:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        200: { description: Success }

  /admin/orders:
    get:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: List all orders
      responses:
        200: { description: Success }

  /admin/orders/{id}/status:
    patch:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [PENDING, PAID, SHIPPED, DELIVERED, CANCELLED] }
      responses:
        200: { description: Success }

  /admin/users:
    get:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: List all users
      responses:
        200: { description: Success }

  /admin/users/{id}/role:
    patch:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Update user role
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string, enum: [USER, ADMIN] }
      responses:
        200: { description: Success }

  /admin/users/{id}/ban:
    patch:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Toggle user ban status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        200: { description: Success }

  /admin/users/{id}:
    delete:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        200: { description: Success }

  /admin/coupons:
    get:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: List all coupons
      responses:
        200: { description: Success }
    post:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Create a new coupon
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string }
                discountType: { type: string, enum: [PERCENTAGE, FIXED] }
                discountValue: { type: number }
                usageLimit: { type: integer }
                expiresAt: { type: string, format: date-time }
      responses:
        201: { description: Created }

